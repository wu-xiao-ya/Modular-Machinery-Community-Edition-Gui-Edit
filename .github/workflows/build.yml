name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build mod jar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 8

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.2

      - name: Build
        run: gradle build --no-daemon --no-parallel --console=plain --stacktrace

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MMCEGE-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
          retention-days: 14
